<VirtualHost *:80>
    ServerName yasfina-app.com
    ServerAlias www.yasfina-app.com

    ProxyPreserveHost On
    
    # TAMBAHKAN BARIS INI (Pengecualian untuk SSL)
    ProxyPass /.well-known/acme-challenge !

    # 1. Proxy untuk Socket.io (Real-time update)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{CONNECTION} Upgrade [NC]
    RewriteRule ^/socket.io/(.*) ws://127.0.0.1:5006/socket.io/$1 [P,L]
    ProxyPass /socket.io http://127.0.0.1:5006/socket.io
    ProxyPassReverse /socket.io http://127.0.0.1:5006/socket.io

    # 2. Proxy untuk Uploads (Foto Pasien, dll)
    ProxyPass /uploads http://127.0.0.1:5006/uploads
    ProxyPassReverse /uploads http://127.0.0.1:5006/uploads

    # 3. Proxy untuk API
    # Cukup arahkan ke http://127.0.0.1:5006 karena Express sudah punya prefix /api
    ProxyPass /api http://127.0.0.1:5006/api
    ProxyPassReverse /api http://127.0.0.1:5006/api

    # 4. Proxy untuk Frontend (Next.js)
    ProxyPass / http://127.0.0.1:3006/
    ProxyPassReverse / http://127.0.0.1:3006/

    ErrorLog ${APACHE_LOG_DIR}/yasfina-error.log
    CustomLog ${APACHE_LOG_DIR}/yasfina-access.log combined
</VirtualHost>
